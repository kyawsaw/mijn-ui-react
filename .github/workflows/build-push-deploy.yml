name: CI/CD Pipeline to build and push container image to GHCR for mijnui-docs

# on:
#  push:
#    branches:
#      - main  # Trigger on pushes to the main branch
#  pull_request:
#    branches:
#      - main  # Trigger on pull requests to the main branch

# Manual trigger
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'version tag eg. 1.0.0, 1.0.1'
        default: {{ github.sha }}
    branch:
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Log in to GitHub Container Registry 
      # https://docs.docker.com/build/ci/github-actions/push-multi-registries/
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PA_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mijnui-docs:latest
            ghcr.io/${{ github.repository_owner }}/mijnui-docs:${{ github.event.inputs.name }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Set up SSH
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 400 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # Deploy to Server
      - name: Deploy to Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
          cd ~/mijn-ui-react
          git pull
          docker compose pull
          docker compose up -d
          EOF
