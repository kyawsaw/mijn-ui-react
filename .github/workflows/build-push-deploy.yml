name: CI/CD Pipeline with GHCR

on:
  push:
    branches:
      - main  # Trigger on pushes to the main branch
  pull_request:
    branches:
      - main  # Trigger on pull requests to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Log in to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PA_TOKEN }}

      # Build the Docker image
      - name: Build Docker Image
        run: docker build -f mijnui.dockerfile -t ghcr.io/${{ github.repository_owner }}/mijnui-docs:${{ github.sha }} .

      # Push the Docker image to GHCR
      - name: Push Docker Image to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/mijnui-docs:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Set up SSH
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # - name: Create SSH key
      #   run: |
      #     echo "$SSH_PRIVATE_KEY" > private.key
      #     sudo chmod 400 private.key
      #     eval `ssh-agent -s`
      #     ssh-add private.key
      #     mkdir -p ~/.ssh
      #     touch ~/.ssh/known_hosts
      #     chmod 644 ~/.ssh/known_hosts
      #     ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts



      - name: Deploy to Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
          cd ~/mijn-ui-react
          docker compose pull
          docker compose up -d
          EOF
